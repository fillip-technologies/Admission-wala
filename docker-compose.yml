services:
  mongo:
    image: mongo:7
    container_name: aw-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    container_name: aw-backend
    restart: unless-stopped
    # Loads secrets (JWT, SMTP, Cloudinary, …) from backend/.env.
    env_file:
      - ./backend/.env
    # These override anything in .env so the container talks to the mongo
    # service and trusts the containerised frontend origin.
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/Addmission_wala
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      args:
        # Baked into the SPA at build time — must be reachable from the browser.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api/v1}
    container_name: aw-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
